<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Simple Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef2f7;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #1f2937;
      color: white;
      text-align: center;
      padding: 30px;
    }

    section {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #444;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      background-color: #2563eb;
      color: white;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 6px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #1f2937;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <header>
    <h1>My GitHub Website</h1>
    <p>Learning GitHub, GitHub Pages, and CI Actions</p>
  </header>

  <section>
    <h2>Welcome!</h2>
    <p>
      This is a simple HTML page created for GitHub practice.
      You can push this file to GitHub and check whether CI runs successfully.
    </p>

    <a href="#" class="btn">Get Started</a>
  </section>

  <footer>
    <p>© 2026 My Simple Website</p>
  </footer>

</body>
</html>
